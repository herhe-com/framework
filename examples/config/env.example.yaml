# This file combines the module examples into a single config snapshot.
# Copy it to `conf/env.yaml` and then replace the dynamic sections in Go code
# where needed, such as `kernel.providers`, `kernel.consoles`, callbacks,
# server handlers, and cron task functions.

app:
  name: example
  version: 1.0.0
  location: Asia/Shanghai
  language: zh
  debug: false
  node: 1

cache:
  TTL: 120

server:
  address: 0.0.0.0
  port: "9600"

service:
  address: 0.0.0.0
  port: "8600"

database:
  migration:
    table: sys_migration
    dir: /migration
  orm:
    default: default
    connections:
      default:
        driver: mysql
        username: root
        password: ""
        host: 127.0.0.1
        port: "3306"
        db: upper
        charset: utf8mb4_unicode_ci
        prefix: ""
        log_mode: error
      report:
        driver: mysql
        username: root
        password: ""
        host: 127.0.0.1
        port: "3306"
        db: upper_report
        charset: utf8mb4_unicode_ci
        prefix: rpt_
        log_mode: error
      postgres:
        driver: postgresql
        username: postgres
        password: ""
        host: 127.0.0.1
        port: "5432"
        db: upper
        sslmode: disable
        timezone: Asia/Shanghai
        prefix: ""
        log_mode: error
      sqlite:
        driver: sqlite
        path: /database/default.db
  redis:
    default:
      driver: redis
      host: 127.0.0.1
      port: "6379"
      username: ""
      password: ""
      db: 0
    cache:
      driver: redis
      host: 127.0.0.1
      port: "6379"
      username: ""
      password: ""
      db: 1

mongodb:
  default:
    driver: mongodb
    uri: ""
    username: ""
    password: ""
    host: 127.0.0.1
    port: "27017"
    db: upper
    auth_source: admin
    timeout: 10

filesystem:
  default: default
  disks:
    default:
      driver: s3
      access: ""
      secret: ""
      region: us-east-1
      bucket: ""
      domain: ""
      endpoint: ""
    public:
      driver: s3
      access: ""
      secret: ""
      region: us-east-1
      bucket: public-bucket
      domain: https://static.example.com
      endpoint: ""

jwt:
  secret: ""
  sub: default
  lifetime: 720
  leeway: 3

auth:
  casbin:
    table: sys_casbin
    database: default
  platforms:
    - 400
  login:
    max_attempts: 5
    lock_duration: 15
    show_attempts: false
    identifier_field: username
    lock_message: Account is locked. Please try again in %d minutes.
    attempts_message: "%s (Failed %d times, %d attempts remaining before account lock)"
  callback:
    jwt: null
    refresh: null
  permissions:
    - code: user
      name: 用户管理
      common: true
      platforms:
        - 400
      children:
        - code: list
          name: 用户列表
          common: true
          platforms:
            - 400
        - code: detail
          name: 用户详情
          common: true
          platforms:
            - 400

queue:
  default: default
  connections:
    default:
      driver: rabbitmq
      error: basic_error
      host: 127.0.0.1
      port: 5672
      username: guest
      password: guest
      vhost: /
    report:
      driver: rabbitmq
      host: 127.0.0.1
      port: 5672
      username: guest
      password: guest
      vhost: /

search:
  default: default
  connections:
    default:
      driver: elasticsearch
      host: http://127.0.0.1:9200
      hosts:
        - http://127.0.0.1:9200
      username: elastic
      password: changeme
      prefix: example_
    meilisearch:
      driver: meilisearch
      host: http://127.0.0.1:7700
      secret: masterKey
      prefix: example_

ai:
  driver: openai
  openai:
    default:
      api_key: ""
      base_url: https://api.openai.com/v1
      model: gpt-4o-mini
      prefix: ""
  ollama:
    default:
      host: http://127.0.0.1:11434
      model: llama3.1
      prefix: ""

captcha:
  click:
    min: 4
    max: 4
    width: 300
    height: 220
    char: ""
    padding: 5
  resources:
    bg: /resources/bg
    font: /resources/font

validation:
  label: label
  translation:
    zh:
      required: "{0}不能为空"
      email: "{0}格式不正确"
      min: "{0}长度不能小于 {1}"
    en:
      required: "{0} is required"
      email: "{0} is invalid"
      min: "{0} must be at least {1}"

snowflake:
  node: 1

crontab:
  functions: []

