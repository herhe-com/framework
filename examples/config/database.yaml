# database / redis / mongodb 配置

database:
  migration:
    table: sys_migration
    dir: /migration
  orm:
    default: default
    connections:
      default:
        driver: mysql
        username: root
        password: ""
        host: 127.0.0.1
        port: "3306"
        db: upper
        charset: utf8mb4_unicode_ci
        prefix: ""
        log_mode: error
      report:
        driver: mysql
        username: root
        password: ""
        host: 127.0.0.1
        port: "3306"
        db: upper_report
        charset: utf8mb4_unicode_ci
        prefix: rpt_
        log_mode: error
      postgres:
        driver: postgresql
        username: postgres
        password: ""
        host: 127.0.0.1
        port: "5432"
        db: upper
        sslmode: disable
        timezone: Asia/Shanghai
        prefix: ""
        log_mode: error
      sqlite:
        driver: sqlite
        path: /database/default.db

  redis:
    default: default
    connections:
      default:
        driver: redis
        host: 127.0.0.1
        port: "6379"
        username: ""
        password: ""
        db: 0
      cache:
        driver: redis
        host: 127.0.0.1
        port: "6379"
        username: ""
        password: ""
        db: 1

    mongo:
      default: default
      connections:
        default:
          driver: mongodb
          uri: ""
          username: ""
          password: ""
          host: 127.0.0.1
          port: "27017"
          db: upper
          auth_source: admin
          timeout: 10
        analytics:
          driver: mongodb
          uri: ""
          username: ""
          password: ""
          host: 127.0.0.1
          port: "27017"
          db: analytics
          auth_source: admin
          timeout: 10
